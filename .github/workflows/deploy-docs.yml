name: Deploy Docs

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'packages/**'
      - 'website/**'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

# 수동으로 워크플로우를 실행할 수 있게 함

# 저장소에 쓰기 권한 허용
permissions:
  contents: write
  pages: write
  id-token: write

# 동시에 하나의 배포만 허용
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache-dependency-path: './website/package-lock.json'
          cache: 'npm'

      - name: Install Dependencies
        run: |
          cd website
          npm ci --legacy-peer-deps

      - name: Generate API Docs
        run: |
          cd website
          npm run build

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: ./docs
          branch: gh-pages
          clean: true 